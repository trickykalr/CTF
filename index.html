/* ═══════════════════════════════════════════════════════
   WAVE REVEAL — canvas overlay sur l'image LSB
   ─────────────────────────────────────────────────────
   Quand la bonne fréquence est trouvée, on insère un
   <canvas> de distorsion par-dessus le canvas de l'œuvre.
   L'effet dure ~2.8 s puis disparaît.
═══════════════════════════════════════════════════════ */
.wave-reveal-canvas {
  position: absolute;
  inset: 10px;         /* correspond au padding du .art-frame */
  pointer-events: none;
  border-radius: 2px;
  z-index: 10;
  /* démarre invisible, le JS prend la main */

<!-- ══════════════════════════════════════════════════════
     ③ SCRIPT WAVE REVEAL — coller juste avant </body>
     ══════════════════════════════════════════════════ -->
<script id="WAVE_REVEAL_SCRIPT">
/**
 * SpectreWaveReveal
 * -----------------
 * Appeler `SpectreWaveReveal.play(artFrame)` quand la solution
 * LSB est validée, où `artFrame` est l'élément .art-frame contenant
 * le canvas de l'œuvre.
 *
 * L'animation :
 *   0 →  0.6 s  : apparition du bruit + amplitude max (chaos)
 *   0.6 → 2.2 s : l'onde ralentit progressivement
 *   2.2 → 2.8 s : fondu final, image parfaitement nette
 */
const SpectreWaveReveal = (() => {

  function play(artFrame) {
    const srcCanvas = artFrame.querySelector('.art-canvas');
    if (!srcCanvas) return;

    /* Si déjà en cours, ignorer */
    if (artFrame.querySelector('.wave-reveal-canvas')) return;

    const W = srcCanvas.offsetWidth  || srcCanvas.width;
    const H = srcCanvas.offsetHeight || srcCanvas.height;

    /* Canvas de distorsion positionné par-dessus */
    const wc = document.createElement('canvas');
    wc.className = 'wave-reveal-canvas';
    wc.width  = W;
    wc.height = H;
    artFrame.style.position = 'relative'; /* s'assurer */
    artFrame.appendChild(wc);

    const ctx = wc.getContext('2d');

    /* Capture l'image source une seule fois */
    const img = new Image();
    img.onload = () => startAnim(img);

    /* Tenter de lire le contenu du canvas source.
       Si cross-origin, on utilise une capture via toDataURL. */
    try {
      const srcCtx = srcCanvas.getContext('2d');
      if (srcCtx) {
        img.src = srcCanvas.toDataURL();
      } else {
        img.src = srcCanvas.src || '';
      }
    } catch(e) {
      /* canvas tainted — fallback couleur */
      img.src = '';
      startAnim(null);
    }

    function startAnim(source) {
      const DURATION  = 2800;  /* ms total */
      const CHAOS_END = 600;   /* ms d'amplitude max */
      const WAVE_END  = 2200;  /* ms où l'onde est à 0 */
      const FADE_DUR  = DURATION - WAVE_END;

      const start = performance.now();
      let raf;

      function ease(t) {
        /* ease out cubic */
        return 1 - Math.pow(1 - t, 3);
      }

      function draw(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / DURATION, 1);

        /* Facteur d'amplitude de l'onde (0→1→0) */
        let amp;
        if (elapsed < CHAOS_END) {
          amp = ease(elapsed / CHAOS_END);
        } else if (elapsed < WAVE_END) {
          amp = 1 - ease((elapsed - CHAOS_END) / (WAVE_END - CHAOS_END));
        } else {
          amp = 0;
        }

        /* Fréquences multiples pour un aspect organique */
        const t = elapsed / 1000;
        const freq1 = 0.04 + amp * 0.06;
        const freq2 = 0.07 + amp * 0.04;
        const speed1 = 2.2;
        const speed2 = 3.1;
        const maxDisp = amp * 18; /* pixels de déplacement max */

        ctx.clearRect(0, 0, W, H);

        /* Dessiner ligne par ligne avec décalage horizontal */
        const step = 2; /* résolution : 1 = parfait, 2 = plus rapide */
        for (let y = 0; y < H; y += step) {
          const wave = Math.sin(y * freq1 + t * speed1) * maxDisp
                     + Math.sin(y * freq2 + t * speed2) * (maxDisp * .4);

          if (source) {
            ctx.drawImage(
              source,
              0, y,            /* src x, src y */
              W, step,         /* src w, src h */
              wave, y,         /* dst x (décalé), dst y */
              W, step          /* dst w, dst h */
            );
          } else {
            /* Pas de source : dessiner des barres colorées */
            const hue = (y * 0.8 + t * 60) % 360;
            ctx.fillStyle = `hsla(${hue},70%,50%,0.4)`;
            ctx.fillRect(wave, y, W, step);
          }
        }

        /* Superposition de vignetting pendant le chaos */
        if (amp > 0.01) {
          const vgGrad = ctx.createRadialGradient(
            W/2, H/2, H * 0.1,
            W/2, H/2, H * 0.75
          );
          vgGrad.addColorStop(0, `rgba(2,1,10,0)`);
          vgGrad.addColorStop(1, `rgba(2,1,10,${amp * 0.5})`);
          ctx.fillStyle = vgGrad;
          ctx.fillRect(0, 0, W, H);

          /* Lignes de scan horizontales subtiles */
          ctx.fillStyle = `rgba(168,85,247,${amp * 0.04})`;
          for (let sy = 0; sy < H; sy += 4) {
            ctx.fillRect(0, sy, W, 1);
          }
        }

        /* Fade out final */
        if (elapsed >= WAVE_END) {
          const fadeP = (elapsed - WAVE_END) / FADE_DUR;
          wc.style.opacity = String(1 - ease(fadeP));
        }

        if (progress < 1) {
          raf = requestAnimationFrame(draw);
        } else {
          /* Nettoyage : retirer le canvas de distorsion */
          cancelAnimationFrame(raf);
          wc.remove();

          /* Flash vert de confirmation */
          flashReveal(artFrame);
        }
      }

      raf = requestAnimationFrame(draw);
    }
  }

  function flashReveal(artFrame) {
    const flash = document.createElement('div');
    flash.style.cssText = `
      position:absolute;inset:0;z-index:20;border-radius:2px;
      background:rgba(34,197,94,0.18);pointer-events:none;
      animation:waveFlash .5s ease forwards;
    `;
    if (!document.getElementById('wave-flash-kf')) {
      const s = document.createElement('style');
      s.id = 'wave-flash-kf';
      s.textContent = `
        @keyframes waveFlash {
          0%   { opacity:0; box-shadow:0 0 0   rgba(34,197,94,0); }
          30%  { opacity:1; box-shadow:0 0 40px rgba(34,197,94,.5); }
          100% { opacity:0; box-shadow:0 0 0   rgba(34,197,94,0); }
        }`;
      document.head.appendChild(s);
    }
    artFrame.appendChild(flash);
    setTimeout(() => flash.remove(), 600);
  }

  return { play };
})();

  ─────────────────────────────────────────────────────────────
*/
</script>
